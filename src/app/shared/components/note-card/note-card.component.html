<mat-card class="note-card" appearance="outlined">
  <mat-card-header>
    <mat-card-title>{{ note.title }}</mat-card-title>
    <mat-card-subtitle>{{ note.description }}</mat-card-subtitle>
  </mat-card-header>

  <mat-card-content>
    <mat-chip-set>
      @for (tag of note.tags; track tag) {
        <mat-chip>{{ tag }}</mat-chip>
      }
    </mat-chip-set>
  </mat-card-content>

  <mat-card-actions>
    <a
      mat-flat-button
      color="primary"
      [routerLink]="['/download']"
      [queryParams]="{ url: note.downloadLink, title: note.title, desc: note.description }"
    >
      <mat-icon>download</mat-icon>
      Download PDF
    </a>
  </mat-card-actions>
</mat-card>
