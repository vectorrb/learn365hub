<mat-card class="note-card" appearance="outlined">
  <mat-card-header>
    <mat-card-title>{{ note.title }}</mat-card-title>
    <mat-card-subtitle>{{ note.description }}</mat-card-subtitle>
  </mat-card-header>

  <mat-card-content>
    <mat-chip-set>
      @for (tag of note.tags; track tag) {
        <mat-chip>{{ tag }}</mat-chip>
      }
    </mat-chip-set>
  </mat-card-content>

  <mat-card-actions>
    @for (resource of resourceButtons; track resource.key) {
      <a
        mat-flat-button
        class="resource-btn {{ resource.className }}"
        [routerLink]="['/view-pdf']"
        [queryParams]="{ url: getResourceLink(resource.key), title: note.title, desc: note.description, type: resource.label }"
      >
        <mat-icon>{{ resource.icon }}</mat-icon>
        {{ resource.label }}
      </a>
    }
  </mat-card-actions>
</mat-card>
